name: Documentation

# Build the Sphinx manual in docs/ and publish it to GitHub Pages on every
# push to the default branch. Also runnable manually from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: pip install -r docs/requirements.txt

      - name: Build the HTML manual
        run: sphinx-build -b html docs/source docs/build/html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the built site as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
